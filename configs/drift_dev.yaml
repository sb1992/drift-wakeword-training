model_name: drift_dev
target_phrases: ["drift dev"]

n_samples: 10000
n_samples_val: 2000
n_background_samples: 200
n_background_samples_val: 40
tts_batch_size: 50

custom_negative_phrases:
  - "dev"
  - "drift"
  - "drift deaf"
  - "drift death"
  - "drift den"
  - "drift dead"
  - "drift debt"
  - "drift deck"
  - "drift depth"
  - "drift deft"
  - "drift devs"
  - "drift dove"
  - "drift delve"
  - "drip dev"
  - "trip dev"
  - "gift dev"

noise_scales: [0.98]
noise_scale_ws: [0.98]
length_scales: [0.75, 1.0, 1.25]
slerp_weights: [0.2, 0.35, 0.5, 0.65, 0.8]

data_dir: ./data
output_dir: ./output

augmentation:
  clip_duration: 2.0
  batch_size: 16
  rounds: 2
  background_paths: [./data/backgrounds]
  rir_paths: [./data/rirs]

model:
  model_type: conv_attention
  model_size: small

steps: 50000
learning_rate: 0.0001
weight_decay: 0.01
label_smoothing: 0.05
max_negative_weight: 1500
target_fp_per_hour: 0.2

batch_n_per_class:
  positive: 50
  adversarial_negative: 50
  ACAV100M_sample: 1024
  background_noise: 50
